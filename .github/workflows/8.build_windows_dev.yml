name: Build Windows Dev Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
      - dev

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: windows-latest
    env:
      PYTHONHASHSEED: 0
      SOURCE_DATE_EPOCH: 315532800
      MARCH7TH_LOG_LEVEL: DEBUG
      MARCH7TH_BROWSER_DOWNLOAD_USE_MIRROR: false
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "false"

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller==6.17.0
          python build.py --task ocr

      - name: Generate program
        run: |
          pyinstaller --distpath '.\dist\' '.\March7th Assistant.spec' -y
          pyinstaller --distpath '.\dist\' '.\March7th Launcher.spec' -y
          pyinstaller --distpath '.\dist\March7thAssistant\' '.\March7th Updater.spec' -y

      - name: Move assets to dist directory
        run: |
          Copy-Item -Path ".\dist\March7th Assistant\*" -Destination ".\dist\March7thAssistant\" -Recurse -Force
          Copy-Item -Path ".\dist\March7th Launcher\*" -Destination ".\dist\March7thAssistant\" -Recurse -Force
          Copy-Item -Path ".\assets\" -Destination ".\dist\March7thAssistant\assets\" -Recurse -Force
          Copy-Item -Path ".\README.md" -Destination ".\dist\March7thAssistant\" -Force

      - name: Create archive
        run: |
          Rename-Item -Path .\dist\March7thAssistant -NewName March7thAssistant_dev_${{ github.run_number }}
          .\assets\binary\7za.exe a -t7z -m0=lzma2 -ms=on -mx=9 -md=128m .\dist\March7thAssistant_dev_${{ github.run_number }}.7z .\dist\March7thAssistant_dev_${{ github.run_number }}\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: March7thAssistant_dev_${{ github.run_number }}.7z
          path: ./dist/March7thAssistant_dev_${{ github.run_number }}.7z
          compression-level: 0
